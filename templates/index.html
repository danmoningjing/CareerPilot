<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerPilot AI 求职导航</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="app-shell">
    <section class="intro">
      <div>
        <p class="eyebrow">AI 求职导航</p>
        <h1>输入你的背景，获得适合投递的岗位方向</h1>
        <p class="intro-copy">
          面向大三、大四、双非本科、大专生和普通求职者，先收集关键信息，下一步生成岗位 TOP5、匹配度和 30 天行动路线。
        </p>
      </div>
      <div class="intro-panel">
        <span>输出内容</span>
        <strong>岗位 TOP5</strong>
        <small>匹配度 / 推荐理由 / 难度 / 补充能力 / 行动路线</small>
      </div>
    </section>

    <section class="workspace">
      <form id="profileForm" class="profile-form">
        <div class="form-header">
          <div>
            <h2>求职画像</h2>
            <p>信息越具体，推荐越准确。</p>
          </div>
          <button class="ghost-button" type="reset">清空</button>
        </div>

        <div class="form-grid">
          <label>
            <span>学历</span>
            <select name="education" required>
              <option value="">请选择</option>
              <option>大专</option>
              <option>双非本科</option>
              <option>普通本科</option>
              <option>一本 / 211 / 985</option>
              <option>硕士</option>
            </select>
          </label>

          <label>
            <span>阶段</span>
            <select name="stage" required>
              <option value="">请选择</option>
              <option>大三</option>
              <option>大四</option>
              <option>应届生</option>
              <option>毕业 1 年内</option>
              <option>毕业 1-3 年</option>
              <option>转行求职</option>
            </select>
          </label>

          <label>
            <span>专业</span>
            <input name="major" type="text" placeholder="例如：工商管理、计算机、英语" required>
          </label>

          <label>
            <span>当前城市</span>
            <input name="city" type="text" placeholder="例如：武汉" required>
          </label>

          <label>
            <span>目标城市</span>
            <input name="targetCity" type="text" placeholder="例如：杭州、上海、成都">
          </label>

          <label>
            <span>期望行业</span>
            <select name="industry">
              <option value="">暂不确定</option>
              <option>互联网</option>
              <option>电商</option>
              <option>教育</option>
              <option>制造业</option>
              <option>金融</option>
              <option>传媒 / 内容</option>
              <option>本地生活</option>
              <option>不限行业</option>
            </select>
          </label>
        </div>

        <label class="full-field">
          <span>已掌握技能</span>
          <textarea name="skills" rows="3" placeholder="例如：Excel、PPT、Python、剪辑、公众号运营、SQL、沟通能力" required></textarea>
        </label>

        <label class="full-field">
          <span>兴趣方向</span>
          <textarea name="interests" rows="3" placeholder="例如：内容运营、数据分析、产品、稳定岗位、和人沟通、技术开发"></textarea>
        </label>

        <label class="full-field">
          <span>实习 / 项目 / 校园经历</span>
          <textarea name="experience" rows="4" placeholder="描述你做过的实习、课程项目、比赛、社团、兼职或作品。没有也可以写“暂无”。" required></textarea>
        </label>

        <fieldset class="preference-group">
          <legend>求职偏好</legend>
          <label><input type="checkbox" name="preferences" value="入门门槛低">入门门槛低</label>
          <label><input type="checkbox" name="preferences" value="成长空间">成长空间</label>
          <label><input type="checkbox" name="preferences" value="薪资优先">薪资优先</label>
          <label><input type="checkbox" name="preferences" value="稳定优先">稳定优先</label>
          <label><input type="checkbox" name="preferences" value="专业相关">专业相关</label>
          <label><input type="checkbox" name="preferences" value="接受转行">接受转行</label>
        </fieldset>

        <div class="actions">
          <button class="primary-button" type="submit">生成岗位推荐</button>
          <p id="formHint" class="form-hint">提交后会调用 /api/recommend，当前返回模拟岗位推荐。</p>
        </div>
      </form>

      <aside class="result-preview" aria-live="polite">
        <div class="result-header">
          <h2>推荐结果</h2>
          <span id="profileStatus">待填写</span>
        </div>
        <div id="previewContent" class="empty-state">
          <strong>填写左侧信息后，这里会展示岗位 TOP5。</strong>
          <p>当前阶段先使用模拟数据，后续可替换为真实 AI 推荐。</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
